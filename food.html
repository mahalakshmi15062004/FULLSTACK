<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodieExpress | Order Online</title>
   
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
     
        :root {
            --primary-gradient: linear-gradient(135deg, #ff9966 0%, #ff5e62 100%);
            --secondary-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2d3436;
            --text-gray: #636e72;
            --accent: #ff5e62;
            --shadow: 0 10px 20px rgba(0,0,0,0.08);
            --radius: 20px;
        }

        {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
        }

      
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-icon-wrapper {
            position: relative;
            cursor: pointer;
            background: var(--primary-gradient);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(255, 94, 98, 0.4);
        }

        .cart-icon-wrapper:hover {
            transform: translateY(-2px);
        }

        .cart-count {
            background: white;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        
        .hero {
            height: 50vh;
            background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80') no-repeat center/cover;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4));
        }

        .hero-content {
            position: relative;
            z-index: 1;
            color: white;
            animation: fadeIn 1s ease;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        
        .category-filter {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            border: none;
            background: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 600;
            color: var(--text-gray);
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary-gradient);
            color: white;
            transform: translateY(-3px);
        }

        
        .food-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 1rem 5% 5rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .food-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            animation: fadeIn 0.5s ease-out;
        }

        .food-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .card-img-container {
            height: 200px;
            overflow: hidden;
        }

        .card-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .food-card:hover .card-img-container img {
            transform: scale(1.1);
        }

        .card-details {
            padding: 1.5rem;
        }

        .food-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .food-desc {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent);
        }

        .add-btn {
            background: var(--text-dark);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background: var(--primary-gradient);
            transform: rotate(90deg);
        }

     
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 900;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .overlay.active { display: block; opacity: 1; }

        .cart-sidebar {
            position: fixed;
            top: 0; right: -400px;
            width: 380px;
            height: 100vh;
            background: white;
            z-index: 1000;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
        }

        .cart-sidebar.open { right: 0; }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        .cart-items-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 1rem;
            padding-right: 5px;
        }

       
        .cart-items-container::-webkit-scrollbar { width: 5px; }
        .cart-items-container::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 10px;
            animation: fadeIn 0.3s;
        }

        .cart-item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .item-info { flex: 1; }
        .item-info h4 { font-size: 0.95rem; margin-bottom: 4px; }
        .item-info .item-price { color: var(--accent); font-weight: 600; }

        .remove-item {
            color: #ff5e62;
            cursor: pointer;
            align-self: center;
            font-size: 1.1rem;
            padding: 5px;
        }

        .cart-footer {
            border-top: 1px solid #eee;
            padding-top: 1.5rem;
            margin-top: auto;
        }

        .total-box {
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.3s;
        }

        .checkout-btn:hover { filter: brightness(1.1); }

       
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2d3436;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 500px) {
            .hero h1 { font-size: 2.2rem; }
            .cart-sidebar { width: 100%; }
            .food-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-burger"></i> FoodieExpress
        </div>
        <div class="cart-icon-wrapper" onclick="toggleCart()">
            <i class="fas fa-shopping-basket"></i>
            <span>Cart</span>
            <div class="cart-count" id="cart-count">0</div>
        </div>
    </header>

    
    <section class="hero">
        <div class="hero-content">
            <h1>Craving Something?</h1>
            <p>Fresh food delivered to your doorstep.</p>
        </div>
    </section>

   
    <div class="category-filter">
        
    </div>

   
    <div class="food-container" id="menu-container">
        
    </div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">

        <div class="cart-items-container" id="cart-items">

                <p>Cart is Empty</p>
            </div>
        </div>

        <div class="cart-footer">
            <div class="total-box">
                <span>Total</span>
                <span id="cart-total">₹0</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Checkout Now</button>
        </div>
    </div>

   
    <div class="toast" id="toast">
        <i class="fas fa-check-circle" style="color: #00b894;"></i>
        <span id="toast-msg">Item added to cart</span>
    </div>

                desc: "Fried chicken breast with spicy mayo and pickles."
            },
            {
                id: 7,
                name: "Mutton Biryani",
                price: 450,
                category: "biryani",
                img: "https://images.unsplash.com/photo-1633945274405-b6c8069047b0?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80",
                desc: "Slow-cooked mutton with saffron rice and fried onions."
            },
            {
                id: 8,
                name: "Chocolate Brownie",
                price: 149,
                category: "dessert",
                img: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80",
                desc: "Fudgy brownie topped with hot chocolate sauce."
            }
        ];

        let cart = [];

        
        function renderMenu(cat, btn) {
           
            if(btn) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            const filtered = cat === 'all' ? foodItems : foodItems.filter(item => item.category === cat);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'food-card';
                card.innerHTML = `
                    <div class="card-img-container">
                        <img src="${item.img}" alt="${item.name}">
                    </div>
                    <div class="card-details">
                        <h3 class="food-title">${item.name}</h3>
                        <p class="food-desc">${item.desc}</p>
                        <div class="card-bottom">
                            <span class="price">₹${item.price}</span>
                            <button class="add-btn" onclick="addToCart(${item.id})">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function addToCart(id) {
            const item = foodItems.find(i => i.id === id);
            cart.push(item);
            updateCart();
            showToast(`Added ${item.name}`);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-items');
            const count = document.getElementById('cart-count');
            const totalEl = document.getElementById('cart-total');
            
            
            count.innerText = cart.length;
            count.style.animation = 'pulse 0.3s ease';
            setTimeout(() => count.style.animation = '', 300);

           
            let total = cart.reduce((sum, i) => sum + i.price, 0);
            totalEl.innerText = `₹${total}`;

           
            list.innerHTML = '';
            if(cart.length === 0) {
                list.innerHTML = `
                    <div style="text-align:center; margin-top:50px; color:#aaa;">
                        <i class="fas fa-shopping-cart" style="font-size:3rem; margin-bottom:10px; opacity:0.3;"></i>
                        <p>Cart is Empty</p>
                    </div>`;
            } else {
                cart.forEach((item, idx) => {
                    const el = document.createElement('div');
                    el.className = 'cart-item';
                    el.innerHTML = `
                        <img src="${item.img}" alt="">
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <span class="item-price">₹${item.price}</span>
                        </div>
                        <i class="fas fa-trash-alt remove-item" onclick="removeFromCart(${idx})"></i>
                    `;
                    list.appendChild(el);
                });
            }
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function checkout() {
            if(cart.length === 0) {
                showToast("Cart is empty!", true);
                return;
            }
            let total = cart.reduce((sum, i) => sum + i.price, 0);
            alert(`Order placed successfully!\nTotal Amount: ₹${total}`);
            cart = [];
            updateCart();
            toggleCart();
        }

        
        function showToast(msg, error = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.background = error ? '#ff5e62' : '#2d3436';
            toast.querySelector('i').className = error ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

      
        window.onload = () => renderMenu('all');

    </script>
